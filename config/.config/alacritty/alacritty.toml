[general]
import = [
  "~/.config/alacritty/current-theme.toml"
]
live_config_reload = true

[font]
normal = { family = "SauceCodePro Nerd Font", style = "Regular" }
bold = { style = "Bold" }
italic = { style = "Italic" }
bold_italic = { style = "Bold Italic" }
size = 12.0
offset = { x = 0, y = 2 }
glyph_offset = { x = 0, y = 1 }
builtin_box_drawing = true

[scrolling]
history = 10000
multiplier = 5

[window]
opacity = 0.7
decorations = "None"
padding = { x = 6, y = 4 }

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "Block", blinking = "Off" }
unfocused_hollow = true

[bell]
duration = 0

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key = "T"
mods = "Control|Shift"
action = "CreateNewWindow"
